<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Trasformatore 01</title>

  <style>
    .map-container {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .map-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .marker {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      border: 2px solid #fff;
      user-select: none;
    }

    .verde { background: #00cc44; }
    .celestino { background: #66ccff; }

    .selected {
      width: 28px !important;
      height: 28px !important;
      border: 3px solid yellow !important;
      z-index: 20;
    }

    .tooltip {
      position: absolute;
      padding: 6px 10px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 16px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-weight: 600;
      border-radius: 4px;
      white-space: nowrap;
      transform: translate(-50%, -120%);
      pointer-events: none;
      display: none;
      z-index: 30;
    }
  </style>
</head>

<body>
  <div class="map-container" id="map">
    <img src="img/Trasformatore_01.jpg" alt="Planimetria Trasformatore 01" />
    <div id="tooltip" class="tooltip"></div>
  </div>

  <script>
    // SCALA DI RIFERIMENTO: 1500 x 957 px

    const markers = [
      { id: "palo_01", x: 671/1500,  y: 244/957, color: "verde",     pdf: "pdf/P_1.pdf" },
      { id: "palo_02", x: 762/1500,  y: 244/957, color: "verde",     pdf: "pdf/P_2.pdf" },

      { id: "palo_06", x: 1120/1500, y: 244/957, color: "verde",     pdf: "pdf/P_6.pdf" },

      { id: "palo_07", x: 671/1500,  y: 420/957, color: "verde",     pdf: "pdf/P_7.pdf" },
      { id: "palo_08", x: 762/1500,  y: 420/957, color: "verde",     pdf: "pdf/P_8.pdf" },
      { id: "palo_09", x: 851/1500,  y: 420/957, color: "verde",     pdf: "pdf/P_9.pdf" },
      { id: "palo_10", x: 930/1500,  y: 420/957, color: "verde",     pdf: "pdf/P_10.pdf" },
      { id: "palo_11", x: 1030/1500, y: 420/957, color: "verde",     pdf: "pdf/P_11.pdf" },

      { id: "palo_15", x: 843/1500,  y: 483/957, color: "celestino", pdf: "pdf/P_15.pdf" },
      { id: "palo_16", x: 962/1500,  y: 483/957, color: "celestino", pdf: "pdf/P_16.pdf" },
      { id: "palo_17", x: 1081/1500, y: 483/957, color: "celestino", pdf: "pdf/P_17.pdf" },
      { id: "palo_18", x: 1202/1500, y: 483/957, color: "celestino", pdf: "pdf/P_18.pdf" },

      { id: "palo_19", x: 603/1500,  y: 583/957, color: "celestino", pdf: "pdf/P_19.pdf" },
      { id: "palo_20", x: 724/1500,  y: 583/957, color: "celestino", pdf: "pdf/P_20.pdf" },
      { id: "palo_21", x: 843/1500,  y: 583/957, color: "celestino", pdf: "pdf/P_21.pdf" },
      { id: "palo_22", x: 962/1500,  y: 583/957, color: "celestino", pdf: "pdf/P_22.pdf" },
      { id: "palo_23", x: 1081/1500, y: 583/957, color: "celestino", pdf: "pdf/P_23.pdf" },

      { id: "palo_25", x: 603/1500,  y: 682/957, color: "celestino", pdf: "pdf/P_25.pdf" },
      { id: "palo_26", x: 724/1500,  y: 682/957, color: "celestino", pdf: "pdf/P_26.pdf" },
      { id: "palo_27", x: 843/1500,  y: 682/957, color: "celestino", pdf: "pdf/P_27.pdf" },
      { id: "palo_28", x: 962/1500,  y: 682/957, color: "celestino", pdf: "pdf/P_28.pdf" },
      { id: "palo_29", x: 1081/1500, y: 682/957, color: "celestino", pdf: "pdf/P_29.pdf" },
      { id: "palo_30", x: 1202/1500, y: 682/957, color: "celestino", pdf: "pdf/P_30.pdf" },

      { id: "palo_31", x: 603/1500,  y: 782/957, color: "celestino", pdf: "pdf/P_31.pdf" },
      { id: "palo_32", x: 724/1500,  y: 782/957, color: "celestino", pdf: "pdf/P_32.pdf" },
      { id: "palo_33", x: 843/1500,  y: 782/957, color: "celestino", pdf: "pdf/P_33.pdf" },
      { id: "palo_34", x: 962/1500,  y: 782/957, color: "celestino", pdf: "pdf/P_34.pdf" },
      { id: "palo_35", x: 1081/1500, y: 782/957, color: "celestino", pdf: "pdf/P_35.pdf" },
      { id: "palo_36", x: 1202/1500, y: 782/957, color: "celestino", pdf: "pdf/P_36.pdf" },

      { id: "palo_37", x: 603/1500,  y: 880/957, color: "celestino", pdf: "pdf/P_37.pdf" },
      { id: "palo_38", x: 724/1500,  y: 880/957, color: "celestino", pdf: "pdf/P_38.pdf" },
      { id: "palo_39", x: 843/1500,  y: 880/957, color: "celestino", pdf: "pdf/P_39.pdf" },
      { id: "palo_40", x: 962/1500,  y: 880/957, color: "celestino", pdf: "pdf/P_40.pdf" },
      { id: "palo_41", x: 1081/1500, y: 880/957, color: "celestino", pdf: "pdf/P_41.pdf" },
      { id: "palo_42", x: 1202/1500, y: 880/957, color: "celestino", pdf: "pdf/P_42.pdf" }
    ];

    const map = document.getElementById("map");
    const tooltip = document.getElementById("tooltip");

    let selectedMarker = null;

    markers.forEach(m => {
      const el = document.createElement("div");
      el.id = m.id;
      el.className = "marker " + (m.color || "");

      el.style.left = (m.x * 100) + "%";
      el.style.top  = (m.y * 100) + "%";

      el.addEventListener("mouseenter", () => {
        tooltip.textContent = "Palo " + m.id.replace("palo_", "");
        tooltip.style.left = (m.x * 100) + "%";
        tooltip.style.top  = (m.y * 100) + "%";
        tooltip.style.display = "block";
      });

      el.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
      });

      el.addEventListener("click", () => {
        if (selectedMarker) selectedMarker.classList.remove("selected");
        el.classList.add("selected");
        selectedMarker = el;

        if (m.pdf) {
          window.open(m.pdf, "_blank");
        }
      });

      map.appendChild(el);
    });
  </script>
</body>
</html>
