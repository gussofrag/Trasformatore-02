<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Trasformatore 02</title>

  <style>
    .map-container {
      position: relative;
      width: 1269px;
      height: 810px;
    }

    .map-container img {
      width: 1269px;
      height: 810px;
      display: block;
    }

    .marker {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      border: 2px solid #fff;
      user-select: none;
      transition: 0.15s ease;
    }

    .verde { background: #00cc44; }
    .celestino { background: #66ccff; }
    .arancio { background: #ff9900; }
    .viola   { background: #9933ff; }

    /* Effetti speciali per pali prova */
    .prova-sonica {
      box-shadow: 0 0 10px 4px #00e1ff;
    }

    .prova-carico {
      box-shadow: 0 0 10px 4px #ffd700;
    }

    .selected {
      width: 28px !important;
      height: 28px !important;
      border: 3px solid yellow !important;
      z-index: 20;
    }

    .tooltip {
      position: absolute;
      padding: 6px 10px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 16px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-weight: 600;
      border-radius: 4px;
      white-space: nowrap;
      transform: translate(-50%, -120%);
      pointer-events: none;
      display: none;
      z-index: 30;
    }

    /* Icone in alto a destra */
    #icons-container {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 50;
    }

    .icon-button {
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
    }

    .icon-button:hover {
      transform: scale(1.15);
    }

    /* Pannello legenda */
    #legend-panel {
      position: absolute;
      top: 70px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 16px;
      display: none;
      z-index: 60;
    }

    .legend-sonica {
      display: inline-block;
      width: 16px;
      height: 16px;
      background: #00e1ff;
      box-shadow: 0 0 6px 2px #00e1ff;
      margin-right: 6px;
      border-radius: 50%;
    }

    .legend-carico {
      display: inline-block;
      width: 16px;
      height: 16px;
      background: #ffd700;
      box-shadow: 0 0 6px 2px #ffd700;
      margin-right: 6px;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <div class="map-container" id="map">
    <img src="img/Trasformatore_02.jpg" alt="Planimetria Trasformatore 02" />
    <div id="tooltip" class="tooltip"></div>
  </div>

  <!-- Icone -->
  <div id="icons-container">
    <div id="icon-legend" class="icon-button">📘</div>
    <div id="icon-home" class="icon-button">🏠</div>
  </div>

  <!-- Pannello legenda -->
  <div id="legend-panel">
    <h3>Legenda Prove</h3>
    <p><span class="legend-sonica"></span> Prova Sonica</p>
    <p><span class="legend-carico"></span> Prova di Carico</p>
  </div>

  <script>
    // SCALA DI RIFERIMENTO: 1269 x 810 px

    const markers = [
      { id: "palo_43", x: 479/1269, y: 205/810, color: "arancio", pdf: "pdf/P_43.pdf" },
      { id: "palo_44", x: 555/1269, y: 205/810, color: "arancio", pdf: "pdf/P_44.pdf", prova: "sonica" },
      { id: "palo_45", x: 631/1269, y: 205/810, color: "arancio", pdf: "pdf/P_45.pdf" },
      { id: "palo_46", x: 707/1269, y: 205/810, color: "arancio", pdf: "pdf/P_46.pdf" },
      { id: "palo_47", x: 783/1269, y: 205/810, color: "arancio", pdf: "pdf/P_47.pdf" },
      { id: "palo_48", x: 860/1269, y: 205/810, color: "arancio", pdf: "pdf/P_48.pdf" },

      { id: "palo_49", x: 479/1269, y: 353/810, color: "arancio", pdf: "pdf/P_49.pdf" },
      { id: "palo_50", x: 555/1269, y: 353/810, color: "arancio", pdf: "pdf/P_50.pdf" },
      { id: "palo_51", x: 631/1269, y: 353/810, color: "arancio", pdf: "pdf/P_51.pdf" },
      { id: "palo_52", x: 707/1269, y: 353/810, color: "arancio", pdf: "pdf/P_52.pdf" },
      { id: "palo_53", x: 783/1269, y: 353/810, color: "arancio", pdf: "pdf/P_53.pdf" },
      { id: "palo_54", x: 860/1269, y: 353/810, color: "arancio", pdf: "pdf/P_54.pdf" },

      { id: "palo_55", x: 422/1269, y: 408/810, color: "viola", pdf: "pdf/P_55.pdf" },
      { id: "palo_56", x: 524/1269, y: 408/810, color: "viola", pdf: "pdf/P_56.pdf" },
      { id: "palo_57", x: 625/1269, y: 408/810, color: "viola", pdf: "pdf/P_57.pdf" },
      { id: "palo_58", x: 727/1269, y: 408/810, color: "viola", pdf: "pdf/P_58.pdf" },
      { id: "palo_59", x: 828/1269, y: 408/810, color: "viola", pdf: "pdf/P_59.pdf" },
      { id: "palo_60", x: 930/1269, y: 408/810, color: "viola", pdf: "pdf/P_60.pdf" },

      { id: "palo_61", x: 422/1269, y: 492/810, color: "viola", pdf: "pdf/P_61.pdf" },
      { id: "palo_62", x: 524/1269, y: 492/810, color: "viola", pdf: "pdf/P_62.pdf" },
      { id: "palo_63", x: 625/1269, y: 492/810, color: "viola", pdf: "pdf/P_63.pdf" },
      { id: "palo_64", x: 727/1269, y: 492/810, color: "viola", pdf: "pdf/P_64.pdf" },
      { id: "palo_65", x: 828/1269, y: 492/810, color: "viola", pdf: "pdf/P_65.pdf" },
      { id: "palo_66", x: 930/1269, y: 492/810, color: "viola", pdf: "pdf/P_66.pdf" },

      { id: "palo_67", x: 422/1269, y: 576/810, color: "viola", pdf: "pdf/P_67.pdf" },
      { id: "palo_68", x: 524/1269, y: 576/810, color: "viola", pdf: "pdf/P_68.pdf" },
      { id: "palo_69", x: 625/1269, y: 576/810, color: "viola", pdf: "pdf/P_69.pdf" },
      { id: "palo_70", x: 727/1269, y: 576/810, color: "viola", pdf: "pdf/P_70.pdf", prova: "sonica" },
      { id: "palo_71", x: 828/1269, y: 576/810, color: "viola", pdf: "pdf/P_71.pdf" },
      { id: "palo_72", x: 930/1269, y: 576/810, color: "viola", pdf: "pdf/P_72.pdf" },

      { id: "palo_73", x: 422/1269, y: 660/810, color: "viola", pdf: "pdf/P_73.pdf" },
      { id: "palo_74", x: 524/1269, y: 660/810, color: "viola", pdf: "pdf/P_74.pdf", prova: "carico" },
      { id: "palo_75", x: 625/1269, y: 660/810, color: "viola", pdf: "pdf/P_75.pdf" },
      { id: "palo_76", x: 727/1269, y: 660/810, color: "viola", pdf: "pdf/P_76.pdf" },
      { id: "palo_77", x: 828/1269, y: 660/810, color: "viola", pdf: "pdf/P_77.pdf" },
      { id: "palo_78", x: 930/1269, y: 660/810, color: "viola", pdf: "pdf/P_78.pdf" },

      { id: "palo_79", x: 422/1269, y: 744/810, color: "viola", pdf: "pdf/P_79.pdf" },
      { id: "palo_80", x: 524/1269, y: 744/810, color: "viola", pdf: "pdf/P_80.pdf" },
      { id: "palo_81", x: 625/1269, y: 744/810, color: "viola", pdf: "pdf/P_81.pdf" },
      { id: "palo_82", x: 727/1269, y: 744/810, color: "viola", pdf: "pdf/P_82.pdf" },
      { id: "palo_83", x: 828/1269, y: 744/810, color: "viola", pdf: "pdf/P_83.pdf" },
      { id: "palo_84", x: 930/1269, y: 744/810, color: "viola", pdf: "pdf/P_84.pdf" }
    ];

    const map = document.getElementById("map");
    const tooltip = document.getElementById("tooltip");

    let selectedMarker = null;

    markers.forEach(m => {
      const el = document.createElement("div");
      el.id = m.id;
      el.className = "marker " + (m.color || "");

      // Applica stile prova
      if (m.prova === "sonica") el.classList.add("prova-sonica");
      if (m.prova === "carico") el.classList.add("prova-carico");

      el.style.left = (m.x * 100) + "%";
      el.style.top  = (m.y * 100) + "%";

      el.addEventListener("mouseenter", () => {
        tooltip.textContent =
          "Palo " + m.id.replace("palo_", "") +
          (m.prova ? " – Prova " + m.prova : "");

        tooltip.style.left = (m.x * 100) + "%";
        tooltip.style.top  = (m.y * 100) + "%";
        tooltip.style.display = "block";
      });

      el.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
      });

      el.addEventListener("click", () => {
        if (selectedMarker) selectedMarker.classList.remove("selected");
        el.classList.add("selected");
        selectedMarker = el;

        if (m.pdf) {
          window.open(m.pdf, "_blank");
        }
      });

      map.appendChild(el);
    });

    // Icona legenda
    document.getElementById("icon-legend").addEventListener("click", () => {
      const panel = document.getElementById("legend-panel");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    });

    // Icona home
    document.getElementById("icon-home").addEventListener("click", () => {
      window.location.href = "../index.html";
    });
  </script>
</body>
</html>
